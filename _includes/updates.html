<section class="page-section bg-light" id="updates">
    <div class="container">

        <div class="text-center">
            <h2 class="section-heading text-uppercase">Updates</h2>
            <h3 class="section-subheading text-muted">
                What I’ve been working on recently.
            </h3>
        </div>

        {% for update in site.updates reversed %}
        <div class="post-card">

            <div class="post-header">
                <div class="post-avatar">
                    <i class="fas fa-user"></i>
                </div>
                <div>
                    <div class="post-name">Chris Basinger</div>
                    <div class="post-time">
                        {{ update.date | date: "%b %d, %Y" }}
                    </div>
                </div>
            </div>

            <div class="post-content">
                {{ update.content | strip_html | truncate: 180 }}
            </div>

            {% if update.image %}
            <img class="post-image" src="{{ update.image }}" alt=""/>
            {% endif %}

        </div>
        {% endfor %}

    </div>
</section>
